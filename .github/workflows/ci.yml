name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore HermesTrade/HermesTrade.sln

      - name: Build
        run: dotnet build HermesTrade/HermesTrade.sln --configuration Release --no-restore

      - name: Pack (dry-run)
        run: dotnet pack HermesTrade/HermesTrade.csproj --configuration Release --no-build --output ./nupkg
